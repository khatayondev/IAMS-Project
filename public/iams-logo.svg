<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B5ED7" />
      <stop offset="100%" stop-color="#084298" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="white"/>

  <!-- Briefcase -->
  <rect x="50" y="80" width="100" height="70" rx="6" fill="url(#grad)"/>
  <path d="M 60 80 Q 60 60 100 60 Q 140 60 140 80" stroke="url(#grad)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="100" y1="80" x2="100" y2="150" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Left: Graduation Cap -->
  <g transform="translate(80, 110)">
    <circle cx="0" cy="-3" r="8" fill="white"/>
    <rect x="-10" y="3" width="20" height="3" fill="white"/>
    <line x1="0" y1="6" x2="0" y2="12" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="14" r="2" fill="white"/>
  </g>

  <!-- Right: Document with Checkmark -->
  <g transform="translate(120, 110)">
    <rect x="-8" y="-8" width="16" height="20" rx="1.5" fill="white"/>
    <line x1="-5" y1="-3" x2="5" y2="-3" stroke="url(#grad)" stroke-width="1"/>
    <line x1="-5" y1="1" x2="5" y2="1" stroke="url(#grad)" stroke-width="1"/>
    <path d="M -3 5 L -0.5 7.5 L 3.5 3" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>